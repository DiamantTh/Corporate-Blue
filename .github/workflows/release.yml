name: Release Theme

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          LATEST=$(git tag --list 'v*' --sort=-version:refname | head -n 1)
          if [ -z "$LATEST" ]; then
            NEXT="v1.0.0"
          else
            # Increment patch version
            MAJOR=$(echo "$LATEST" | sed 's/v\([0-9]*\)\..*/\1/')
            MINOR=$(echo "$LATEST" | sed 's/v[0-9]*\.\([0-9]*\)\..*/\1/')
            PATCH=$(echo "$LATEST" | sed 's/v[0-9]*\.[0-9]*\.\([0-9]*\)/\1/')
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      - name: Create archive
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ARCHIVE="corporate-blue-${TAG}.tar.bz2"
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_preview.html' \
            --exclude='_screenshot.png' \
            --exclude='_settings.json' \
            --exclude='unicode_reference' \
            -cjf "$ARCHIVE" \
            -C . \
            assets templates README.md
          echo "archive=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Corporate Blue ${{ steps.version.outputs.tag }}
          files: ${{ env.archive }}
          generate_release_notes: true
